<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red Flag Detector</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0f0f0f;
            color: #f0f0f0;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 2rem;
        }

        header h1 {
            font-size: 28px;
            font-weight: 600;
            color: #fff;
            letter-spacing: -0.5px;
        }

        header p {
            font-size: 14px;
            color: #888;
            margin-top: 6px;
            line-height: 1.5;
        }

        .doc-types {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }

        .doc-type {
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid #333;
            font-size: 12px;
            cursor: pointer;
            background: transparent;
            color: #888;
            transition: all 0.15s;
        }

        .doc-type:hover {
            border-color: #555;
            color: #ccc;
        }

        .doc-type.active {
            border-color: #e24b4a;
            color: #e24b4a;
            background: rgba(226, 75, 74, 0.08);
        }

        textarea {
            width: 100%;
            min-height: 180px;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid #2a2a2a;
            background: #1a1a1a;
            color: #f0f0f0;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
            line-height: 1.6;
            outline: none;
            transition: border-color 0.15s;
        }

        textarea:focus {
            border-color: #444;
        }

        textarea::placeholder {
            color: #444;
        }

        .analyze-btn {
            margin-top: 12px;
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #333;
            background: #1a1a1a;
            color: #f0f0f0;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            letter-spacing: 0.02em;
        }

        .analyze-btn:hover {
            background: #222;
            border-color: #555;
        }

        .analyze-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .loading {
            text-align: center;
            padding: 2.5rem;
            color: #555;
            font-size: 14px;
        }

        .results {
            margin-top: 2rem;
        }

        .score-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 1.5rem;
        }

        .score-card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 1rem;
            text-align: center;
        }

        .score-label {
            font-size: 11px;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 8px;
        }

        .score-val {
            font-size: 26px;
            font-weight: 600;
        }

        .score-val.danger {
            color: #e24b4a;
        }

        .score-val.warning {
            color: #ef9f27;
        }

        .score-val.success {
            color: #5dcaa5;
        }

        .score-val.neutral {
            font-size: 13px;
            color: #aaa;
            padding-top: 6px;
        }

        .verdict {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 1.25rem;
            margin-bottom: 1.5rem;
        }

        .section-title {
            font-size: 11px;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 10px;
        }

        .verdict-text {
            font-size: 14px;
            color: #ccc;
            line-height: 1.7;
        }

        .flag-card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 1rem 1.25rem;
            margin-bottom: 10px;
            border-left: 3px solid transparent;
        }

        .flag-card.critical {
            border-left-color: #e24b4a;
        }

        .flag-card.high {
            border-left-color: #ef9f27;
        }

        .flag-card.medium {
            border-left-color: #378add;
        }

        .severity-badge {
            display: inline-block;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 20px;
            margin-bottom: 6px;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .badge-critical {
            background: rgba(226, 75, 74, 0.15);
            color: #e24b4a;
        }

        .badge-high {
            background: rgba(239, 159, 39, 0.15);
            color: #ef9f27;
        }

        .badge-medium {
            background: rgba(55, 138, 221, 0.15);
            color: #378add;
        }

        .flag-title {
            font-size: 14px;
            font-weight: 500;
            color: #f0f0f0;
            margin-bottom: 4px;
        }

        .flag-desc {
            font-size: 13px;
            color: #888;
            line-height: 1.6;
        }

        .error {
            color: #e24b4a;
            font-size: 13px;
            padding: 1rem;
            background: rgba(226, 75, 74, 0.1);
            border-radius: 10px;
            margin-top: 1rem;
            border: 1px solid rgba(226, 75, 74, 0.2);
        }

        footer {
            margin-top: 3rem;
            text-align: center;
            font-size: 12px;
            color: #333;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>Red Flag Detector</h1>
            <p>Paste any job description, contract, policy, or terms & conditions.<br>AI surfaces the red flags before
                you sign.</p>
        </header>

        <div class="doc-types">
            <button class="doc-type active" onclick="selectType(this,'Job Description')">Job Description</button>
            <button class="doc-type" onclick="selectType(this,'Contract')">Contract</button>
            <button class="doc-type" onclick="selectType(this,'Terms & Conditions')">Terms & Conditions</button>
            <button class="doc-type" onclick="selectType(this,'Policy Document')">Policy Document</button>
            <button class="doc-type" onclick="selectType(this,'Other')">Other</button>
        </div>

        <textarea id="doc-input" placeholder="Paste your document text here..."></textarea>
        <button class="analyze-btn" onclick="analyze()" id="analyze-btn">Analyze for Red Flags</button>

        <div id="output"></div>

        <footer>Built with Python, Flask & Claude API</footer>
    </div>

    <script>
        let selectedType = 'Job Description';

        function selectType(el, type) {
            document.querySelectorAll('.doc-type').forEach(d => d.classList.remove('active'));
            el.classList.add('active');
            selectedType = type;
        }

        function getSeverityClass(s) {
            if (!s) return 'medium';
            const l = s.toLowerCase();
            if (l.includes('critical')) return 'critical';
            if (l.includes('high')) return 'high';
            return 'medium';
        }

        function getTrustColor(score) {
            if (score <= 40) return 'danger';
            if (score <= 65) return 'warning';
            return 'success';
        }

        async function analyze() {
            const text = document.getElementById('doc-input').value.trim();
            if (!text) return;

            const btn = document.getElementById('analyze-btn');
            btn.disabled = true;
            btn.textContent = 'Analyzing...';
            document.getElementById('output').innerHTML = '<div class="loading">Reading between the lines...</div>';

            try {
                const res = await fetch('/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text, doc_type: selectedType })
                });

                const result = await res.json();
                if (result.error) throw new Error(result.error);
                renderResults(result);
            } catch (e) {
                document.getElementById('output').innerHTML = `<div class="error">Something went wrong: ${e.message}</div>`;
            }

            btn.disabled = false;
            btn.textContent = 'Analyze for Red Flags';
        }

        function renderResults(r) {
            const trustColor = getTrustColor(r.trust_score);
            const flagsHtml = (r.red_flags || []).map(f => {
                const sc = getSeverityClass(f.severity);
                return `<div class="flag-card ${sc}">
        <span class="severity-badge badge-${sc}">${f.severity}</span>
        <div class="flag-title">${f.title}</div>
        <div class="flag-desc">${f.explanation}</div>
      </div>`;
            }).join('');

            document.getElementById('output').innerHTML = `
      <div class="results">
        <div class="score-row">
          <div class="score-card">
            <div class="score-label">Trust Score</div>
            <div class="score-val ${trustColor}">${Math.round(r.trust_score)}/100</div>
          </div>
          <div class="score-card">
            <div class="score-label">Red Flags</div>
            <div class="score-val ${r.flag_count > 3 ? 'danger' : r.flag_count > 1 ? 'warning' : 'success'}">${r.flag_count}</div>
          </div>
          <div class="score-card">
            <div class="score-label">Document Type</div>
            <div class="score-val neutral">${selectedType}</div>
          </div>
        </div>
        <div class="verdict">
          <div class="section-title">Verdict</div>
          <div class="verdict-text">${r.verdict}</div>
        </div>
        <div class="flags-section">
          <div class="section-title">Red Flags Detected</div>
          ${flagsHtml}
        </div>
      </div>`;
        }
    </script>
</body>

</html>
